<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Scraper</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .success { background: #d4edda; border-left: 4px solid green; padding: 15px; margin: 10px 0; }
        .error { background: #f8d7da; border-left: 4px solid red; padding: 15px; margin: 10px 0; }
        .info { background: #d1ecf1; border-left: 4px solid blue; padding: 15px; margin: 10px 0; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="nav">
        <a href="/">🏠 CRUD</a> |
        <a href="/scrape-websocket">🕷️ WebSocket Scraper</a> |
        <a href="/scraping-umsida">📊 Scraping UMSIDA</a>
    </div>
    
    <h1>🕷️ Web Scraper Real-time dengan WebSocket</h1>
    <div>
        <input type="text" id="url" placeholder="Masukkan URL (contoh: https://example.com)">
        <button onclick="startScraping()">Mulai Scraping</button>
    </div>
    <div id="result"></div>

    <script>
        const socket = io();
        
        socket.on('connect', () => {
            document.getElementById('result').innerHTML += '<div class="info">✅ Terhubung ke server WebSocket</div>';
        });
        
        socket.on('scraping_started', (data) => {
            document.getElementById('result').innerHTML += `<div class="info">🔄 ${data.message}</div>`;
        });
        
        socket.on('scrape_result', (data) => {
            if (data.status === 'success') {
                let html = `<div class="success">
                    <strong>✅ Hasil dari: ${data.url}</strong><br>
                    <strong>📄 Title:</strong> ${data.title}<br>
                    <strong>📝 Headings:</strong><ul>`;
                data.headings.forEach(h => { html += `<li>${h}</li>`; });
                html += `</ul></div>`;
                document.getElementById('result').innerHTML += html;
            } else {
                document.getElementById('result').innerHTML += `<div class="error">❌ Error: ${data.message}</div>`;
            }
        });
        
        function startScraping() {
            const url = document.getElementById('url').value;
            if (url) {
                socket.emit('start_scraping', { url: url });
                document.getElementById('result').innerHTML += `<div class="info">📤 Mengirim perintah ke: ${url}</div>`;
            } else {
                alert('Masukkan URL!');
            }
        }
    </script>
</body>
</html>
